backend:
  name: github
  repo: camelidresearch/camelidresearchstudies-V2
  branch: main
  base_url: https://sveltia-cms-auth.info-camelidresearch.workers.dev

media_folder: src/assets/img
public_folder: /assets/img

slug:
  encoding: ascii
  clean_accents: true

# ── i18n (abilita la traduzione in Sveltia CMS) ──
i18n:
  structure: multiple_folders
  locales: [it, en]
  default_locale: it

collections:
  # ── News ──
  - name: news
    label: News
    label_singular: Articolo
    folder: src/news
    create: true
    delete: true
    i18n: true
    slug: "{{slug}}"
    summary: "{{title}}"
    sort_by: date
    fields:
      - { name: title, label: Titolo, widget: string, i18n: true, required: [it] }
      - { name: date, label: Data di pubblicazione, widget: datetime, format: "YYYY-MM-DD", time_format: false, i18n: duplicate }
      - name: autore
        label: Autore
        widget: select
        default: redazione
        i18n: duplicate
        options:
          - { label: "Dr.ssa Camilla Esclapon de Villeneuve", value: camilla }
          - { label: "Dr.ssa Alessia Ciaramelli", value: alessia }
          - { label: "Redazione (Camelid Research Studies APS)", value: redazione }
      - name: sommario
        label: Sommario
        widget: text
        i18n: true
        hint: "Una o due frasi. Appare nell'elenco delle news e come descrizione su Google."
        required: [it]
      - { name: immagine, label: "Foto (opzionale)", widget: image, required: false, i18n: duplicate }
      - name: immagine_alt
        label: "Descrizione della foto"
        widget: string
        required: false
        i18n: true
        hint: "OBBLIGATORIA se carichi una foto: descrivi cosa si vede, es. 'Un alpaca bianco al pascolo tra gli ulivi'. Senza descrizione il sito non si pubblica."
      - { name: body, label: "Testo dell'articolo", widget: markdown, i18n: true, required: [it] }

  # ── Materiale divulgativo ──
  - name: divulgazione
    label: Materiali divulgativi
    label_singular: Articolo divulgativo
    folder: src/divulgazione
    create: true
    delete: true
    i18n: true
    slug: "{{slug}}"
    summary: "{{title}}"
    sort_by: date
    fields:
      - { name: title, label: Titolo, widget: string, i18n: true, required: [it] }
      - { name: date, label: Data di pubblicazione, widget: datetime, format: "YYYY-MM-DD", time_format: false, i18n: duplicate }
      - name: autore
        label: Autore
        widget: select
        default: redazione
        i18n: duplicate
        options:
          - { label: "Dr.ssa Camilla Esclapon de Villeneuve", value: camilla }
          - { label: "Dr.ssa Alessia Ciaramelli", value: alessia }
          - { label: "Redazione (Camelid Research Studies APS)", value: redazione }
      - name: sommario
        label: Sommario
        widget: text
        i18n: true
        required: [it]
        hint: "Una o due frasi. Appare nell'elenco e come descrizione su Google."
      - { name: immagine, label: "Foto (opzionale)", widget: image, required: false, i18n: duplicate }
      - name: immagine_alt
        label: "Descrizione della foto"
        widget: string
        required: false
        i18n: true
        hint: "OBBLIGATORIA se carichi una foto: senza descrizione il sito non si pubblica."
      - { name: body, label: "Testo dell'articolo", widget: markdown, i18n: true, required: [it] }

  # ── Biblioteca scientifica ──
  - name: biblioteca
    label: Biblioteca scientifica
    label_singular: Scheda
    folder: src/biblioteca
    create: true
    delete: true
    i18n: true
    extension: md
    slug: "{{fields.code}}"
    summary: "{{fields.code}} — {{fields.title}}"
    fields:
      - { name: code, label: Codice scheda, widget: string, i18n: duplicate, hint: "Es. CRL-A-001" }
      - { name: title, label: Titolo dell'articolo, widget: string, i18n: true, required: [it] }
      - { name: authors, label: Autori, widget: string, i18n: duplicate }
      - { name: journal, label: Rivista, widget: string, i18n: duplicate }
      - { name: year, label: Anno, widget: number, value_type: int, i18n: duplicate }
      - { name: volume, label: Volume, widget: string, required: false, i18n: duplicate }
      - { name: pages, label: Pagine, widget: string, required: false, i18n: duplicate }
      - { name: doi, label: DOI, widget: string, i18n: duplicate }
      - name: species
        label: Specie
        widget: select
        i18n: duplicate
        options:
          - "Alpaca (Vicugna pacos)"
          - "Llama (Lama glama)"
          - "Alpaca & Llama"
          - "South American camelids (general)"
      - name: area
        label: Area tematica
        widget: select
        i18n: duplicate
        options:
          - "Anaesthesia & Analgesia"
          - "Surgery"
          - "Internal Medicine"
          - "Reproduction"
          - "Welfare & Behaviour"
          - "Nutrition"
          - "Infectious Diseases"
          - "Dermatology"
          - "Neonatology"
          - "Animal-Assisted Interventions"
          - "Other"
      - name: evidence_level
        label: Livello di evidenza
        widget: select
        i18n: duplicate
        options:
          - { label: "Case Report", value: "Case Report" }
          - { label: "Case Series", value: "Case Series" }
          - { label: "Cohort / Cross-sectional", value: "Cohort Study" }
          - { label: "Randomised Controlled Trial", value: "RCT" }
          - { label: "Systematic Review / Meta-analysis", value: "Systematic Review" }
      - name: evidence_score
        label: Punteggio evidenza (1–5)
        widget: number
        value_type: int
        min: 1
        max: 5
        default: 1
        i18n: duplicate
        hint: "1 = Case Report, 2 = Case Series, 3 = Cohort, 4 = RCT, 5 = Systematic Review"
      - name: at_glance
        label: Colpo d'occhio (punti chiave)
        widget: list
        i18n: true
        field: { name: point, label: Punto, widget: string }
        required: [it]
      - { name: objective, label: Objective, widget: text, i18n: true, required: [it] }
      - { name: background, label: Background, widget: text, i18n: true, required: [it] }
      - { name: methods, label: Methods, widget: text, i18n: true, required: [it] }
      - name: protocol
        label: Protocol
        widget: object
        i18n: true
        required: [it]
        fields:
          - { name: patient, label: Patient, widget: text, required: false }
          - { name: anaesthetic, label: Anaesthetic Protocol, widget: text, required: false }
          - { name: surgical, label: Surgical Procedure, widget: text, required: false }
          - { name: nerve_block, label: Specific Technique, widget: text, required: false }
          - { name: monitoring, label: Monitoring, widget: text, required: false }
      - name: findings
        label: Key Findings
        widget: list
        i18n: true
        required: [it]
        field: { name: finding, label: Finding, widget: string }
      - name: clinical_implications
        label: Clinical Implications
        widget: list
        i18n: true
        required: [it]
        field: { name: implication, label: Implication, widget: string }
      - name: limitations
        label: Limitations
        widget: list
        i18n: true
        required: [it]
        field: { name: limitation, label: Limitation, widget: string }
      - name: take_home
        label: Key Take-Home Messages
        widget: list
        i18n: true
        required: [it]
        field: { name: message, label: Message, widget: string }
      - { name: citation, label: Citazione completa, widget: text, i18n: duplicate }
      - { name: body, label: "Commentary (testo libero dell'associazione)", widget: markdown, i18n: true, required: [it] }

  # ── Contenuti del sito (file singoli, non bilingui via CMS) ──
  - name: contenuti
    label: Contenuti del sito
    editor: { preview: false }
    files:
      - name: progetti
        label: "Progetti 2026–2027 (card, italiano)"
        file: src/_data/progetti.json
        fields:
          - name: it
            label: Italiano
            widget: object
            fields:
              - name: elenco
                label: Elenco progetti
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { name: title, label: Titolo, widget: string }
                  - { name: period, label: Periodo, widget: string, default: "2026 – 2027" }
                  - { name: text, label: Descrizione, widget: text }
      - name: board
        label: Consiglio direttivo
        file: src/_data/board.json
        fields:
          - name: membri
            label: Membri
            widget: list
            summary: "{{fields.name}} — {{fields.role}}"
            fields:
              - { name: name, label: Nome completo, widget: string }
              - { name: role, label: Carica, widget: string }
              - { name: photo, label: "Foto (opzionale)", widget: image, required: false }
              - { name: initials, label: "Iniziali (mostrate se manca la foto)", widget: string }
              - { name: bio, label: "Breve biografia (opzionale)", widget: text, required: false }
